name: Build 格界 deb

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            curl git perl make rsync zip unzip \
            fakeroot dpkg-dev xz-utils ca-certificates \
            clang lld libplist-utils

      - name: Install Theos
        run: |
          sudo mkdir -p /opt/theos
          sudo chown $(whoami) /opt/theos
          git clone --recursive https://github.com/theos/theos.git /opt/theos --depth=1
          ls /opt/theos

      - name: Download iOS SDK
        run: |
          mkdir -p /opt/theos/sdks
          git clone https://github.com/theos/sdks.git /tmp/theos-sdks --depth=1
          cp -r /tmp/theos-sdks/*.sdk /opt/theos/sdks/ 2>/dev/null || ls /tmp/theos-sdks/
          ls /opt/theos/sdks/

      - name: Build 格界
        run: |
          export THEOS=/opt/theos
          cd 格界
          make package FINALPACKAGE=1 2>&1

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: 格界-deb
          path: 格界/packages/*.deb
          if-no-files-found: error
          retention-days: 30
