name: Build 格界 deb

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            curl git perl make rsync zip unzip \
            fakeroot dpkg-dev xz-utils ca-certificates

      - name: Install Theos
        run: |
          export THEOS=/opt/theos
          sudo mkdir -p /opt/theos
          sudo chown $USER /opt/theos
          git clone --recursive https://github.com/theos/theos.git /opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV

      - name: Download iOS SDK
        run: |
          mkdir -p /opt/theos/sdks
          curl -L \
            "https://github.com/xybp888/iOS-SDKs/releases/download/iOS17.5-Xcode15.4/iPhoneOS16.2.sdk.tar.xz" \
            -o /tmp/sdk.tar.xz
          file /tmp/sdk.tar.xz
          tar -xf /tmp/sdk.tar.xz -C /opt/theos/sdks/
          ls /opt/theos/sdks/

      - name: Build 格界
        run: |
          export THEOS=/opt/theos
          cd 格界
          make package FINALPACKAGE=1 2>&1

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: 格界-deb
          path: 格界/packages/*.deb
          if-no-files-found: error
          retention-days: 30
