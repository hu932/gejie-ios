name: Build 格界 deb

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: theos/theos-action@v1
        with:
          theos-sdks-source: https://github.com/theos/sdks

      - name: Build 格界
        run: |
          cd 格界
          make package FINALPACKAGE=1

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: 格界-deb
          path: 格界/packages/*.deb
          if-no-files-found: error
          retention-days: 30
