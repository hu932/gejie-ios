name: Build 格界 deb

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            curl git perl make findutils rsync \
            libplist-utils zip unzip fakeroot \
            clang lld ca-certificates

      - name: Install Theos
        run: |
          export THEOS=/opt/theos
          sudo mkdir -p /opt/theos
          sudo chown $USER /opt/theos
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"

      - name: Download iOS SDK
        run: |
          SDK_DIR=/opt/theos/sdks
          mkdir -p "$SDK_DIR"
          echo "Downloading iOS 16.5 SDK..."
          curl -L \
            "https://github.com/theos/sdks/releases/download/2023-06-01/iPhoneOS16.5.sdk.tar.xz" \
            -o /tmp/sdk.tar.xz \
            --progress-bar
          tar -xf /tmp/sdk.tar.xz -C "$SDK_DIR"
          rm /tmp/sdk.tar.xz
          echo "SDKs available:"
          ls "$SDK_DIR"

      - name: Build 格界
        run: |
          export THEOS=/opt/theos
          cd "格界"
          make package FINALPACKAGE=1 THEOS=/opt/theos 2>&1
          echo ""
          echo "=== Build output ==="
          ls -lh packages/ 2>/dev/null || echo "No packages dir"

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: 格界-deb
          path: 格界/packages/*.deb
          if-no-files-found: error
          retention-days: 30
